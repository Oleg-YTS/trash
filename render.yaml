services:
  - type: web
    name: trash-diet
    runtime: docker
    plan: free
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: WEBHOOK_URL
        value: https://trash-diet.onrender.com/webhook
    healthCheckPath: /
    autoDeploy: true
